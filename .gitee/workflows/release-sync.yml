name: Gitee Release Sync (macOS + Windows)

# Syncs macOS and Windows wheels from GitHub Release to Gitee Release.
# These platforms cannot be cross-compiled from Gitee Go's Linux runners.
# Linux wheels are built natively by release-linux.yml.
#
# This workflow runs alongside release-linux.yml on tag push. If GitHub
# Actions hasn't finished yet, it polls for up to 600 s.
#
# Requires two secrets configured in Gitee:
#   GITHUB_PAT  — read-only access to the GitHub repo
#   GITEE_TOKEN — repo-scoped token for creating Gitee releases + uploading assets

triggers:
  push:
    tags:
      - 'v20*'
      - 'v[0-9]*.*'

stages:
  - stage: sync
    displayName: Sync macOS + Windows wheels from GitHub
    jobs:
      - job: sync-platform-wheels
        displayName: Download and publish
        runsOn: ubuntu-latest
        timeoutMinutes: 20
        steps:
          - name: Checkout
            uses: checkout@v1
            with:
              fetchTags: true

          - name: Extract release tag
            run: |
              if [ -n "${GITEE_REF_NAME:-}" ]; then
                TAG="${GITEE_REF_NAME}"
              elif [ -n "${CI_COMMIT_TAG:-}" ]; then
                TAG="${CI_COMMIT_TAG}"
              else
                TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
              fi
              if [ -z "$TAG" ]; then
                echo "ERROR: cannot determine release tag" >&2
                exit 1
              fi
              echo "RELEASE_TAG=$TAG" >> $GITEE_ENV

          - name: Install Python deps
            run: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq python3 python3-pip
              python3 -m pip install --upgrade pip -q

          - name: Download from GitHub Release
            env:
              GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
            run: |
              python3 packaging/scripts/download-github-release.py \
                --tag "$RELEASE_TAG" \
                --dist-dir dist/combined \
                --max-wait 600

          - name: Publish to Gitee Release
            env:
              GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
            run: |
              python3 packaging/scripts/publish-gitee-from-ci.py \
                --tag "$RELEASE_TAG" \
                --dist-dir dist/combined
