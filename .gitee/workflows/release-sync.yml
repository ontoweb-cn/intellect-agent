name: Gitee Release Sync (macOS + Windows)

# Syncs macOS and Windows wheels from GitHub Release to Gitee Release.
# These platforms cannot be cross-compiled from Gitee Go's Linux runners.
# Linux wheels are built natively by release-linux.yml.
#
# This workflow runs alongside release-linux.yml on tag push. It polls
# GitHub for up to 900 s per attempt, with 3 retries (60 s apart).
#
# Requires two secrets configured in Gitee:
#   GITHUB_PAT  — read-only access to the GitHub repo
#   GITEE_TOKEN — repo-scoped token for creating Gitee releases + uploading assets

triggers:
  push:
    tags:
      - 'v20*'
      - 'v[0-9]*.*'

stages:
  - stage: sync
    displayName: Sync macOS + Windows wheels from GitHub
    jobs:
      - job: sync-platform-wheels
        displayName: Download and publish
        runsOn: ubuntu-latest
        timeoutMinutes: 60
        steps:
          - name: Checkout
            uses: checkout@v1
            with:
              fetchTags: true

          - name: Extract release tag
            run: |
              if [ -n "${GITEE_REF_NAME:-}" ]; then
                TAG="${GITEE_REF_NAME}"
              elif [ -n "${CI_COMMIT_TAG:-}" ]; then
                TAG="${CI_COMMIT_TAG}"
              else
                TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
              fi
              if [ -z "$TAG" ]; then
                echo "ERROR: cannot determine release tag" >&2
                exit 1
              fi
              echo "RELEASE_TAG=$TAG" >> $GITEE_ENV

          - name: Install Python deps
            run: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq python3 python3-pip
              python3 -m pip install --upgrade pip -q

          - name: Sync macOS + Windows wheels + SHA256SUMS (with retry)
            env:
              GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
              GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
            run: |
              set -euo pipefail
              MAX_RETRIES=3
              RETRY_DELAY=60
              for attempt in $(seq 1 $MAX_RETRIES); do
                echo "=== Attempt $attempt/$MAX_RETRIES ==="
                # Clean dist dir on retry
                rm -rf dist/combined 2>/dev/null || true
                mkdir -p dist/combined
                # Download from GitHub (900s poll timeout)
                if python3 packaging/scripts/download-github-release.py \
                    --tag "$RELEASE_TAG" \
                    --dist-dir dist/combined \
                    --max-wait 900; then
                  # Verify SHA256SUMS if present (integrity check before publish)
                  if [ -f dist/combined/SHA256SUMS ]; then
                    echo "Verifying SHA256SUMS..."
                    (cd dist/combined && sha256sum -c SHA256SUMS 2>&1 | tail -5 || echo "Some checksums skipped (non-fatal)")
                  fi
                  # Publish to Gitee (includes SHA256SUMS if present)
                  python3 packaging/scripts/publish-gitee-from-ci.py \
                    --tag "$RELEASE_TAG" \
                    --dist-dir dist/combined
                  echo "Sync succeeded on attempt $attempt"
                  exit 0
                fi
                if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                  echo "Attempt $attempt failed, retrying in ${RETRY_DELAY}s..."
                  sleep "$RETRY_DELAY"
                fi
              done
              echo "All $MAX_RETRIES attempts failed — macOS/Windows wheels not synced (non-fatal)"
              exit 0  # non-fatal: Linux wheels still published by release-linux.yml
