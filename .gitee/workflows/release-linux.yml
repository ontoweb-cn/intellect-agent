name: Gitee Native Release

# Self-contained Gitee CI workflow that builds Linux artifacts (x86_64 +
# aarch64) and publishes directly to Gitee Release.  No dependency on
# GitHub Actions — suitable for mainland China deployment environments.
#
# macOS and Windows wheels are built by GitHub Actions
# (.github/workflows/gitee-release.yml) and synced to Gitee Release via
# the companion release-sync.yml workflow.
#
# Required secret in Gitee repo Settings → Secrets:
#   RELEASE_TOKEN — Gitee private token with repo scope

triggers:
  push:
    tags:
      - 'v20*'
      - 'v[0-9]*.*'

stages:
  - stage: build-and-publish
    displayName: Build Linux Wheels + Publish
    jobs:
      - job: release-native
        displayName: Build and publish to Gitee Release
        runsOn: ubuntu-latest
        timeoutMinutes: 60
        steps:
          - name: Checkout
            uses: checkout@v1
            with:
              fetchTags: true

          # ── Determine release tag ─────────────────────────────────────
          - name: Extract release tag
            run: |
              if [ -n "${GITEE_REF_NAME:-}" ]; then
                TAG="${GITEE_REF_NAME}"
              elif [ -n "${CI_COMMIT_TAG:-}" ]; then
                TAG="${CI_COMMIT_TAG}"
              else
                TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
              fi
              if [ -z "$TAG" ]; then
                echo "ERROR: Not a tagged push — aborting"
                exit 1
              fi
              echo "RELEASE_TAG=$TAG" >> $GITEE_ENV
              echo "Release tag: $TAG"

          # ── Install system deps ───────────────────────────────────────
          - name: Install system dependencies
            run: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq curl build-essential pkg-config libssl-dev \
                python3 python3-pip python3-venv python3-dev
              # Cross-compilation toolchain for aarch64
              sudo apt-get install -y -qq gcc-aarch64-linux-gnu

          # ── Node.js (for TUI) ─────────────────────────────────────────
          - name: Setup Node.js
            run: |
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y -qq nodejs
              node --version && npm --version

          # ── Rust ──────────────────────────────────────────────────────
          - name: Install Rust toolchain
            run: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              rustup target add aarch64-unknown-linux-gnu
              rustc --version && cargo --version

          # ── uv ────────────────────────────────────────────────────────
          - name: Install uv
            run: |
              curl -LsSf https://astral.sh/uv/install.sh | sh
              source $HOME/.cargo/env
              uv --version

          # ── Build TUI ─────────────────────────────────────────────────
          - name: Build TUI
            run: |
              set -euo pipefail
              cd ui-tui && npm ci && npm run build && cd ..
              mkdir -p intellect_cli/tui_dist intellect_cli/scripts
              cp ui-tui/dist/entry.js intellect_cli/tui_dist/entry.js
              cp scripts/install.sh intellect_cli/scripts/install.sh
              cp scripts/install.ps1 intellect_cli/scripts/install.ps1

          # ── Build Python sdist + pure wheel ───────────────────────────
          - name: Build Python distributions
            run: |
              set -euo pipefail
              source $HOME/.cargo/env
              uv build --sdist --wheel
              ls -la dist/

          # ── Build Rust wheel (x86_64) ─────────────────────────────────
          - name: Build Rust wheel (x86_64)
            run: |
              set -euo pipefail
              source $HOME/.cargo/env
              python3 -m pip install --upgrade pip -q
              pip3 install maturin -q
              cd rust-core
              maturin build --release
              mkdir -p target/wheels-all
              cp target/wheels/*.whl target/wheels-all/
              echo "x86_64 wheel built"

          # ── Build Rust wheel (aarch64 cross-compile) ──────────────────
          - name: Build Rust wheel (aarch64)
            run: |
              set -euo pipefail
              source $HOME/.cargo/env
              cd rust-core
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              export PYO3_CROSS_LIB_DIR=/usr/lib/aarch64-linux-gnu
              # Install Python for cross target (maturin needs it)
              pip3 install maturin -q
              maturin build --release --target aarch64-unknown-linux-gnu || \
                echo "WARNING: aarch64 cross-compile failed (non-fatal)"
              if ls target/wheels/intellect_community_core-*-aarch64*.whl 2>/dev/null; then
                cp target/wheels/intellect_community_core-*-aarch64*.whl target/wheels-all/
                echo "aarch64 wheel built"
              else
                echo "aarch64 wheel skipped"
              fi

          # ── Combine artifacts ─────────────────────────────────────────
          - name: Combine artifacts
            run: |
              set -euo pipefail
              mkdir -p dist/combined
              cp dist/*.tar.gz dist/combined/ 2>/dev/null || true
              cp dist/*.whl dist/combined/ 2>/dev/null || true
              cp rust-core/target/wheels-all/*.whl dist/combined/ 2>/dev/null || true
              echo "Combined artifacts:"
              ls -la dist/combined/

          # ── Generate SHA256SUMS ───────────────────────────────────────
          - name: Generate SHA256SUMS
            run: |
              cd dist/combined
              sha256sum * > SHA256SUMS
              cat SHA256SUMS

          # ── Publish to Gitee Release ──────────────────────────────────
          - name: Publish to Gitee Release
            env:
              RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
            run: |
              python3 packaging/scripts/publish-gitee-from-ci.py \
                --tag "$RELEASE_TAG" \
                --dist-dir dist/combined
