name: Release Linux x86_64 (Native Build)

# Self-contained Gitee CI workflow that builds Linux x86_64 artifacts
# and publishes directly to Gitee Release.  No dependency on GitHub Actions.
#
# Required secret in Gitee repo Settings → Secrets:
#   GITEE_TOKEN — Gitee private token with repo scope

triggers:
  push:
    branches:
      - 'ci/test-release'   # test trigger — remove after first successful run
    tags:
      - 'v20*'
      - 'v[0-9]*.*'

stages:
  - stage: build-and-publish
    displayName: Build Linux x86_64 + Publish
    jobs:
      - job: release-linux
        displayName: Build and publish
        runsOn: ubuntu-latest
        timeoutMinutes: 45
        steps:
          - name: Checkout
            uses: checkout@v1
            with:
              fetchTags: true

          # ── Determine release tag ─────────────────────────────────────
          - name: Extract release tag
            run: |
              if [ -n "${GITEE_REF_NAME:-}" ]; then
                TAG="${GITEE_REF_NAME}"
              elif [ -n "${CI_COMMIT_TAG:-}" ]; then
                TAG="${CI_COMMIT_TAG}"
              else
                TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
              fi
              if [ -z "$TAG" ]; then
                # Not a tagged push — derive a test tag from branch + commit
                TAG="test-$(git rev-parse --short HEAD)"
                echo "No tag found, using test tag: $TAG"
              fi
              echo "RELEASE_TAG=$TAG" >> $GITEE_ENV
              echo "Release tag: $TAG"

          # ── Install system deps ───────────────────────────────────────
          - name: Install system dependencies
            run: |
              sudo apt-get update -qq
              sudo apt-get install -y -qq curl build-essential pkg-config libssl-dev

          # ── Node.js (for TUI) ─────────────────────────────────────────
          - name: Setup Node.js
            run: |
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y -qq nodejs
              node --version
              npm --version

          # ── Rust ──────────────────────────────────────────────────────
          - name: Install Rust toolchain
            run: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              rustc --version
              cargo --version

          # ── Python + uv ───────────────────────────────────────────────
          - name: Install Python and uv
            run: |
              sudo apt-get install -y -qq python3 python3-pip python3-venv
              python3 --version
              curl -LsSf https://astral.sh/uv/install.sh | sh
              source $HOME/.cargo/env
              uv --version

          # ── Build TUI ─────────────────────────────────────────────────
          - name: Build TUI
            run: |
              set -euo pipefail
              cd ui-tui
              npm ci
              npm run build
              cd ..
              mkdir -p intellect_cli/tui_dist intellect_cli/scripts
              cp ui-tui/dist/entry.js intellect_cli/tui_dist/entry.js
              cp scripts/install.sh intellect_cli/scripts/install.sh
              cp scripts/install.ps1 intellect_cli/scripts/install.ps1
              echo "TUI built OK"

          # ── Build Python sdist + pure wheel ───────────────────────────
          - name: Build Python distributions
            run: |
              set -euo pipefail
              source $HOME/.cargo/env
              uv build --sdist --wheel
              echo "Python sdist + wheel:"
              ls -la dist/

          # ── Build Rust wheel ──────────────────────────────────────────
          - name: Build Rust wheel
            run: |
              set -euo pipefail
              source $HOME/.cargo/env
              sudo apt-get install -y -qq python3-dev
              python3 -m pip install --upgrade pip
              pip3 install maturin
              cd rust-core
              maturin build --release
              echo "Rust wheel:"
              ls -la target/wheels/

          # ── Combine artifacts ─────────────────────────────────────────
          - name: Combine artifacts
            run: |
              set -euo pipefail
              mkdir -p dist/combined
              # Python sdist + wheel
              cp dist/*.tar.gz dist/combined/ 2>/dev/null || true
              cp dist/*.whl dist/combined/ 2>/dev/null || true
              # Rust wheel
              cp rust-core/target/wheels/*.whl dist/combined/ 2>/dev/null || true
              echo "Combined artifacts:"
              ls -la dist/combined/

          # ── Generate SHA256SUMS ───────────────────────────────────────
          - name: Generate SHA256SUMS
            run: |
              cd dist/combined
              sha256sum * > SHA256SUMS
              cat SHA256SUMS

          # ── Publish to Gitee Release ──────────────────────────────────
          - name: Publish to Gitee Release
            env:
              GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
            run: |
              python3 packaging/scripts/publish-gitee-from-ci.py \
                --tag "$RELEASE_TAG" \
                --dist-dir dist/combined
