name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Intellect — traces conversations, LLM calls, and tool usage. Opt-in via `intellect plugins enable observability/langfuse` (or check the box in `intellect plugins`)."
author: ONTOWEB
requires_env:
  - intellect_LANGFUSE_PUBLIC_KEY
  - intellect_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
