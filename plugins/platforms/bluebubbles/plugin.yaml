name: bluebubbles-platform
label: BlueBubbles (iMessage)
kind: platform
version: 1.0.0
description: >
  BlueBubbles iMessage gateway adapter. Uses the local BlueBubbles macOS
  server for outbound REST sends and inbound webhooks. Supports text,
  media attachments, tapback reactions, typing indicators, and read receipts.

requires_env:
  - name: BLUEBUBBLES_SERVER_URL
    description: "BlueBubbles server URL (e.g. http://192.168.1.100:1234)"
    prompt: "BlueBubbles Server URL"
    password: false
  - name: BLUEBUBBLES_PASSWORD
    description: "BlueBubbles server password for API authentication"
    prompt: "BlueBubbles Password"
    password: true
