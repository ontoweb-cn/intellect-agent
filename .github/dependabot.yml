version: 2
updates:
  # Python dependencies (pip/uv via pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      python-patch:
        update-types:
          - "patch"
      python-minor:
        update-types:
          - "minor"

  # Website (Quartz/React) dependencies
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
      - "website"
    groups:
      website-patch:
        update-types:
          - "patch"
    ignore:
      # Docusaurus is pinned to 3.9.2 — see commit 5baac08
      - dependency-name: "@docusaurus/core"
      - dependency-name: "@docusaurus/preset-classic"
      - dependency-name: "@docusaurus/types"
      - dependency-name: "@docusaurus/module-type-aliases"
      - dependency-name: "docusaurus-theme-mermaid"

  # TUI (Ink/React) dependencies
  - package-ecosystem: "npm"
    directory: "/ui-tui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
      - "ui-tui"
    groups:
      tui-patch:
        update-types:
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
