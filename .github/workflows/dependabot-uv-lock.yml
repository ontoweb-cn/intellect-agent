name: Dependabot uv.lock sync

# When Dependabot updates pyproject.toml, it doesn't run `uv lock`.
# This workflow catches that and commits the updated lockfile so CI passes.

on:
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-lockfile:
    # Only run on Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Run uv lock
        run: uv lock

      - name: Commit updated lockfile
        run: |
          if git diff --quiet uv.lock; then
            echo "No lockfile changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore(deps): sync uv.lock after Dependabot update"
          git push
