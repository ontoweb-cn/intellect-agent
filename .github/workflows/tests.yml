name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slice: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Restore duration cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: test_durations.json
          # Single stable key. main always overwrites, PRs always find it.
          key: test-durations

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run tests (slice ${{ matrix.slice }}/6)
        # Per-file isolation via scripts/run_tests_parallel.py: discovers
        # every test_*.py file under tests/ (excluding integration/ + e2e/),
        # then runs `python -m pytest <file>` in a freshly-spawned subprocess
        # with bounded parallelism. No xdist, no shared workers, no
        # module-level state leakage between files.
        #
        # Why per-file (not per-test): per-test spawn cost (~250ms × 17k
        # tests = 70min CPU minimum) blew the wall-clock budget. Per-file
        # spawn (~250ms × ~850 files = ~3.5min) fits while still giving
        # every file a fresh interpreter — the only isolation boundary
        # that matters in practice (cross-file leakage was the original
        # flake source; intra-file is the test author's responsibility).
        #
        # Why drop xdist entirely: xdist's persistent workers accumulate
        # state across files, which is exactly the leakage we wanted to
        # fix. ThreadPoolExecutor + subprocess.run is ~60 lines and does
        # the job with cleaner semantics.
        #
        # Matrix slicing (--slice I/N): files are distributed across 6
        # jobs by cached duration (LPT algorithm) so each job gets
        # roughly equal wall time. Without a cache, files default to 2s
        # estimate and get split roughly evenly by count — still correct,
        # just not perfectly balanced.
        run: |
          source .venv/bin/activate
          python scripts/run_tests_parallel.py --slice ${{ matrix.slice }}/6
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          ONTOWEB_API_KEY: ""

      - name: Upload per-slice durations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-durations-slice-${{ matrix.slice }}
          path: test_durations.json
          retention-days: 1

  # Merge per-slice duration data into a single cache, so future runs
  # (including PRs) get balanced slicing.
  save-durations:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all slice durations
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test-durations-slice-*
          path: durations
          merge-multiple: true

      - name: Merge into single durations file
        run: |
          python3 -c "
          import json, glob, os
          merged = {}
          for f in glob.glob('durations/*test_durations.json'):
            with open(f) as fh:
              merged.update(json.load(fh))
          with open('test_durations.json', 'w') as fh:
            json.dump(merged, fh, indent=2, sort_keys=True)
          print(f'Merged {len(merged)} file durations')
          "

      - name: Save merged duration cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: test_durations.json
          key: test-durations

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          ONTOWEB_API_KEY: ""

  storage-postgresql:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: intellect
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: intellect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intellect -d intellect_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies (db-postgresql)
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev,db-postgresql]"

      - name: Run PostgreSQL storage smoke tests (W2)
        run: |
          source .venv/bin/activate
          python -m pytest tests/integration/test_storage_postgresql_smoke.py -v --tb=short
        env:
          INTELLECT_PG_DSN: postgresql://intellect:testpass@localhost:5432/intellect_test
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          ONTOWEB_API_KEY: ""

  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest-cov

      - name: Run coverage
        run: |
          python -m pytest tests/ -q --cov --cov-report=term --cov-report=json --timeout=30 \
            -m "not integration" \
            --cov-fail-under=0
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          ONTOWEB_API_KEY: ""

      - name: Coverage summary
        run: |
          python -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          pct = data['totals']['percent_covered']
          print(f'## Coverage: {pct:.1f}%')
          " >> $GITHUB_STEP_SUMMARY

  # ── Rust extension build + test ──────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Run Rust unit tests (fast path, no Python linking)
        run: |
          cd rust-core
          # Run without extension-module feature first — pure Rust tests
          # don't need Python linking and finish in < 1s.
          cargo test --no-default-features -- --test-threads=2
          echo "Rust unit tests (pure): OK"

      - name: Assert minimum Rust test count
        run: |
          cd rust-core
          COUNT=$(cargo test --no-default-features -- --list 2>&1 | grep -c 'test .*\.rs:' || echo 0)
          echo "Rust test count: $COUNT"
          python3 -c "assert $COUNT >= 84, f'Expected >= 84 Rust tests, got {$COUNT}'"
          echo "Test count assertion: OK"

      - name: Run Rust unit tests (with extension module)
        run: |
          cd rust-core
          PYO3_PYTHON=$(which python3) cargo test

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install maturin pyyaml python-dotenv

      - name: Build and install Rust extension
        run: |
          source .venv/bin/activate
          cd rust-core
          maturin develop

      - name: Build wheel (verify release packaging)
        run: |
          source .venv/bin/activate
          cd rust-core
          maturin build --release
          echo "Wheel built: $(ls target/wheels/*.whl)"

      - name: Upload Rust wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: intellect-community-core-wheel
          path: rust-core/target/wheels/*.whl
          retention-days: 7

      - name: Run Rust parity tests
        run: |
          source .venv/bin/activate
          cd rust-core/..
          PYTHONPATH=. python -m pytest tests/intellect_state/test_rust_parity.py -v
          # Assert minimum parity test count (prevents silent regression)
          COUNT=$(PYTHONPATH=. python -m pytest tests/intellect_state/test_rust_parity.py --collect-only -q 2>&1 | grep -c 'test_')
          python3 -c "assert $COUNT >= 45, f'Expected >= 45 parity tests, got {$COUNT}'"
          echo "Parity test count: $COUNT OK"

      - name: Verify sandbox patterns
        run: |
          source .venv/bin/activate
          cd rust-core/..
          PYTHONPATH=. python -c "
          from tools.approval import _normalize_command_for_detection, _HAS_RUST_SANDBOX
          assert _HAS_RUST_SANDBOX, 'Rust sandbox not loaded'
          import intellect_community_core
          n = _normalize_command_for_detection('rm -rf /').lower()
          assert intellect_community_core.detect_hardline_command_rs(n) is not None
          n = _normalize_command_for_detection('echo hello').lower()
          assert intellect_community_core.detect_dangerous_command_rs(n) is None
          print('Sandbox patterns OK')
          "

      - name: Verify AST code checker
        run: |
          source .venv/bin/activate
          cd rust-core/..
          PYTHONPATH=. python -c "
          from tools.approval import _check_python_ast

          # Dangerous code must be caught
          assert _check_python_ast('import os; os.system(\"id\")') is not None, 'os.system not caught'
          assert _check_python_ast('exec(\"id()\")') is not None, 'exec not caught'
          assert _check_python_ast('import pickle; pickle.loads(b\"...\")') is not None, 'pickle not caught'
          assert _check_python_ast('import ctypes; ctypes.CDLL(\"libc.so.6\")') is not None, 'ctypes not caught'

          # Obfuscation must be caught
          assert _check_python_ast('import builtins; getattr(builtins, \"exec\")(\"id()\")') is not None, 'getattr not caught'
          assert _check_python_ast('import os; os.__dict__[\"system\"](\"id\")') is not None, '__dict__ not caught'
          assert _check_python_ast('import importlib; importlib.import_module(\"os\").system(\"id\")') is not None, 'importlib not caught'

          # Safe code must pass
          assert _check_python_ast('print(\"hello\")') is None, 'safe print false positive'
          assert _check_python_ast('import json; print(json.dumps({\"a\":1}))') is None, 'safe json false positive'
          assert _check_python_ast('x = [i**2 for i in range(10)]') is None, 'safe comprehension false positive'

          print('AST checker OK (7 dangerous caught, 3 safe passed)')
          "

      - name: Verify token descriptions (B1)
        run: |
          source .venv/bin/activate
          cd rust-core/..
          PYTHONPATH=. python -c "
          import intellect_community_core as icc

          # Each token should return a distinct, specific description
          result = icc.detect_dangerous_command_rs('python -c \"exec(\\\\\"id()\\\\\")\"')
          assert result is not None and 'exec()' in result[0], f'Bad exec desc: {result}'

          result = icc.detect_dangerous_command_rs('python -c \"import os; os.system(\\\\\"id\\\\\")\"')
          assert result is not None and 'os.system()' in result[0], f'Bad os.system desc: {result}'

          result = icc.detect_dangerous_command_rs('python -c \"import ctypes; ctypes.CDLL(\\\\\"libc.so.6\\\\\")\"')
          assert result is not None and 'ctypes' in result[0], f'Bad ctypes desc: {result}'

          # Benign must pass
          assert icc.detect_dangerous_command_rs('python -c \"print(1)\"') is None

          print('Token descriptions OK')
          "