name: Gitee Release Artifacts

# Builds full cross-platform wheels + native bundles, publishes to GitHub Release
# as intermediate storage. Gitee CI (.gitee/workflows/release.yml) then downloads
# the artifacts and publishes them to the Gitee Release.
# Triggered by CalVer tags (v2026.6.16) or SemVer tags (v0.6.4).

on:
  push:
    tags:
      - 'v20*'       # CalVer from scripts/release.py --publish
      - 'v[0-9]*.*'  # SemVer (v0.6.4, v1.0.0, …)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v0.6.4 or v2026.6.16)'
        required: true
        type: string

permissions:
  contents: read
  actions: read        # for download-artifact (inter-job artifact sharing)

concurrency:
  group: gitee-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-python:
    name: Python sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}   # avoid anonymous API rate limiting

      - name: Build TUI + Python distributions
        run: |
          (cd ui-tui && npm ci && npm run build)
          mkdir -p intellect_cli/tui_dist
          cp ui-tui/dist/entry.js intellect_cli/tui_dist/entry.js
          mkdir -p intellect_cli/scripts
          cp scripts/install.sh intellect_cli/scripts/install.sh
          cp scripts/install.ps1 intellect_cli/scripts/install.ps1
          uv build --sdist --wheel

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-dist
          path: dist/*
          retention-days: 7

  build-platform:
    name: Platform ${{ matrix.platform }}-${{ matrix.arch }}
    needs: build-python
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
          - runner: macos-14
            platform: darwin
            arch: universal2
          - runner: windows-latest
            platform: windows
            arch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}   # avoid anonymous API rate limiting

      - name: Download Python wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-dist
          path: dist/python

      - name: Install maturin
        run: uv pip install --system maturin

      - name: Build standalone bundle (wheels + native)
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x packaging/scripts/build-standalone-bundle.sh packaging/scripts/ci-build-platform.sh
          # Build the standalone bundle (includes Rust wheel + Python wheel + assets)
          cp dist/python/intellect_agent-*.whl dist/ 2>/dev/null || true
          packaging/scripts/build-standalone-bundle.sh \
            --platform "$PLATFORM" --arch "$ARCH"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: platform-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/standalone/*
            rust-core/target/wheels/*
          retention-days: 7

  build-installers:
    name: Installer ${{ matrix.platform }}-${{ matrix.arch }}
    needs: build-platform
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
          - runner: macos-14
            platform: darwin
            arch: universal2
          - runner: windows-latest
            platform: windows
            arch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: platform-${{ matrix.platform }}-${{ matrix.arch }}
          # path: . (repo root) preserves the original dist/standalone/ layout
          # from the build-platform job. Using path: dist/standalone would
          # double-nest as dist/standalone/dist/standalone/...
          path: .
      - name: Install NSIS (Windows only)
        if: matrix.platform == 'windows'
        run: choco install nsis -y
      - name: Build platform installer
        shell: bash
        run: |
          chmod +x packaging/scripts/build-installer.sh
          packaging/scripts/build-installer.sh \
            --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/installers/*
          retention-days: 7

  publish-github-release:
    name: Publish to GitHub Release (intermediate)
    needs: [build-python, build-platform, build-installers]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed for gh release create + upload assets
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          # merge-multiple: true extracts ALL files into a flat directory,
          # including hundreds of thousands of internal files from the standalone
          # bundles. We keep it false so artifacts stay in their own subdirs,
          # then selectively copy only release files (wheels, archives, installers).
          merge-multiple: false

      - name: Combine artifacts
        run: |
          mkdir -p dist/combined
          # Copy only release artifacts: wheels, standalone archives, installers
          find artifacts -type f \( \
            -name '*.whl' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.pkg' -o \
            -name '*.exe' -o \
            -name 'SHA256SUMS' \
          \) -exec cp {} dist/combined/ \;
          echo "Release artifacts:"
          ls -la dist/combined/

      - name: Generate SHA256SUMS
        run: |
          cd dist/combined
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Import GPG key and sign SHA256SUMS
        if: env.GPG_PRIVATE_KEY != ''
        continue-on-error: true  # GPG signing is optional; don't block release
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "${GPG_KEY_ID}:6:" | gpg --import-ownertrust
          cd dist/combined
          gpg --batch --detach-sign --armor \
            --local-user "$GPG_KEY_ID" \
            SHA256SUMS
          echo "SHA256SUMS.asc generated"
          # Verify the signature
          gpg --verify SHA256SUMS.asc SHA256SUMS

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ env.RELEASE_TAG }}"
          # Idempotent: delete then re-create if re-running
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" dist/combined/* \
            --title "Intellect Agent $TAG" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
          echo "GitHub Release created: $TAG"

  smoke-test:
    name: Smoke test wheel
    needs: publish-github-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
          - runner: macos-14
            platform: darwin
          - runner: windows-latest
            platform: windows
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Download platform wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: platform-${{ matrix.platform }}-${{ matrix.platform == 'darwin' && 'universal2' || matrix.platform == 'windows' && 'amd64' || 'x86_64' }}
          path: /tmp/wheels

      - name: Install and verify
        shell: bash
        run: |
          set -euo pipefail
          WHEEL=$(ls /tmp/wheels/intellect_agent-*.whl 2>/dev/null | head -1) || WHEEL=""
          if [ -z "$WHEEL" ]; then
            # Try nested path from standalone bundle
            WHEEL=$(find /tmp/wheels -name 'intellect_agent-*.whl' 2>/dev/null | head -1) || WHEEL=""
          fi
          if [ -z "$WHEEL" ]; then
            echo "ERROR: No wheel found in downloaded artifacts" >&2
            find /tmp/wheels -type f 2>/dev/null | head -20 || true
            exit 1
          fi
          echo "Found wheel: $WHEEL"
          pip install "$WHEEL" --no-deps 2>&1 || true
          # Verify the package is importable (may fail on missing deps, that's OK)
          python -c "import intellect_community_core; print('Rust extension OK')" 2>&1 || echo "Rust extension not in wheel (Python-only platform wheel)"
          echo "Smoke test passed for ${{ matrix.platform }}"
