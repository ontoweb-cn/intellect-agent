name: Gitee Release Artifacts

# Builds full cross-platform wheels + native bundles, uploads to Gitee Release.
# Triggered by CalVer tags (v2026.6.16) or SemVer tags (v0.6.4).

on:
  push:
    tags:
      - 'v20*'       # CalVer from scripts/release.py --publish
      - 'v[0-9]*.*'  # SemVer (v0.6.4, v1.0.0, …)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v0.6.4 or v2026.6.16)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: gitee-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-python:
    name: Python sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Build TUI + Python distributions
        run: |
          cd ui-tui && npm ci && npm run build
          mkdir -p intellect_cli/tui_dist
          cp ui-tui/dist/entry.js intellect_cli/tui_dist/entry.js
          mkdir -p intellect_cli/scripts
          cp scripts/install.sh intellect_cli/scripts/install.sh
          cp scripts/install.ps1 intellect_cli/scripts/install.ps1
          uv build --sdist --wheel

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-dist
          path: dist/*
          retention-days: 7

  build-platform:
    name: Platform ${{ matrix.platform }}-${{ matrix.arch }}
    needs: build-python
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
          - runner: macos-14
            platform: darwin
            arch: universal2
          - runner: windows-latest
            platform: windows
            arch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Download Python wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-dist
          path: dist/python

      - name: Install maturin
        run: uv pip install --system maturin

      - name: Build platform artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          PYTHON_WHEEL_DIR: ${{ github.workspace }}/dist/python
        run: |
          chmod +x packaging/scripts/ci-build-platform.sh
          packaging/scripts/ci-build-platform.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: platform-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/out/*
          retention-days: 7

  publish-gitee:
    name: Publish to Gitee Release
    needs: [build-python, build-platform]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-tags: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: python-dist|platform-*
          merge-multiple: true

      - name: Combine artifacts
        run: |
          mkdir -p dist/combined
          find artifacts -type f ! -name 'SHA256SUMS' -exec cp -f {} dist/combined/ \;
          ls -la dist/combined/

      - name: Upload to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          python3 packaging/scripts/publish-gitee-from-ci.py \
            --tag "${{ env.RELEASE_TAG }}" \
            --dist-dir dist/combined
