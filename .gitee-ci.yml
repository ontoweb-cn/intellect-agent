# Gitee CI — release builds run via GitHub Actions (mirrors to Gitee Release).
#
# Workflow: .github/workflows/gitee-release.yml
# Trigger:  CalVer tag (v2026.6.16) or SemVer tag (v0.6.4) push, or workflow_dispatch
#
# Required secret (GitHub repo settings → Secrets):
#   GITEE_TOKEN — Gitee private token with repo scope
#
# This file prevents Gitee's default Python plugin from failing on pyproject.toml layout.

image: ubuntu-24.04

stages:
  - name: check
    image: ubuntu-24.04
    steps:
      - name: verify project structure
        run: |
          echo "Intellect Agent release CI: .github/workflows/gitee-release.yml"
          echo "Set GITEE_TOKEN in GitHub Actions secrets for Gitee Release upload"
          test -f pyproject.toml && echo "pyproject.toml: OK"
          test -f rust-core/Cargo.toml && echo "Cargo.toml: OK"
          test -f .github/workflows/gitee-release.yml && echo "gitee-release.yml: OK"
